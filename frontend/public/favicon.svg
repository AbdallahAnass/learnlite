<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#4F46E5"/>
  <!-- Book body -->
  <rect x="22" y="30" width="56" height="42" rx="3" ry="3" fill="#ffffff"/>
  <rect x="22" y="30" width="28" height="42" rx="3" ry="3" fill="#E0E7FF"/>
  <!-- Spine -->
  <rect x="48" y="30" width="4" height="42" fill="#C7D2FE"/>
  <!-- Lines on right page -->
  <line x1="58" y1="42" x2="72" y2="42" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="50" x2="72" y2="50" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="58" x2="72" y2="58" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <!-- Graduation cap -->
  <polygon points="50,18 70,27 50,36 30,27" fill="#FBBF24"/>
  <rect x="47" y="27" width="6" height="10" fill="#FBBF24"/>
  <circle cx="50" cy="38" r="4" fill="#F59E0B"/>
  <!-- Tassel string -->
  <line x1="70" y1="27" x2="70" y2="38" stroke="#FBBF24" stroke-width="2"/>
  <circle cx="70" cy="40" r="3" fill="#F59E0B"/>
</svg>
